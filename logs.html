<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logs — Gradifier</title>
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/src/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@300;400;500;600&display=swap');
    * { font-family:'Poppins',sans-serif; } .font-brand{font-family:'Montserrat',sans-serif;}
    select{appearance:none;-webkit-appearance:none;} tbody tr:hover{background:#f0fdf4!important;}
    .flatpickr-day.selected,.flatpickr-day.selected:hover,
    .flatpickr-day.startRange,.flatpickr-day.startRange:hover,
    .flatpickr-day.endRange,.flatpickr-day.endRange:hover{background:#059669!important;border-color:#059669!important;color:#fff!important;}
    .flatpickr-day.inRange{background:#d1fae5!important;border-color:transparent!important;box-shadow:-5px 0 0 #d1fae5,5px 0 0 #d1fae5!important;}
    .flatpickr-day.has-harvest:not(.selected):not(.startRange):not(.endRange){background:#bbf7d0!important;border-color:#34d399!important;color:#065f46!important;font-weight:600!important;}
    .flatpickr-day.has-harvest.inRange{background:#6ee7b7!important;box-shadow:-5px 0 0 #6ee7b7,5px 0 0 #6ee7b7!important;}
    .flatpickr-day:hover:not(.selected):not(.startRange):not(.endRange):not(.has-harvest){background:#d1fae5!important;}
    .flatpickr-day.has-harvest:not(.selected):not(.startRange):not(.endRange):hover{background:#6ee7b7!important;border-color:#10b981!important;}
    .flatpickr-day.today:not(.selected):not(.startRange):not(.endRange){border-color:#10b981!important;}
    .flatpickr-input{background:#f9fafb;border:1px solid #e5e7eb;color:#374151;font-size:.875rem;border-radius:.75rem;padding:.5rem .75rem;width:100%;outline:none;cursor:pointer;}
    .flatpickr-input:focus{border-color:#34d399;box-shadow:0 0 0 1px #d1fae5;}
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <div id="header-placeholder" class="sticky top-0 z-30"></div>

  <div class="flex flex-1">
    <div id="sidebar-placeholder" class="flex-shrink-0"></div>

    <main class="flex-1 p-6 overflow-x-hidden min-w-0">

      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl font-bold text-gray-800 font-brand">Operation Logs</h1>
          <p class="text-sm text-gray-500 mt-0.5">Individual batch records from the sorting machine</p>
        </div>
        <button onclick="exportToPDF()" class="flex items-center gap-2 text-white text-sm font-semibold px-5 py-2.5 rounded-xl transition-all"
          style="background:linear-gradient(135deg,#10b981,#059669);box-shadow:0 4px 14px rgba(16,185,129,0.35);">
          <i class="fa-solid fa-file-pdf"></i> Export PDF
        </button>
      </div>

      <!-- Filter Bar -->
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 mb-6">
        <form method="get" id="filterForm" class="flex flex-wrap items-end gap-4">
          <div class="flex flex-col gap-1 min-w-[130px]">
            <label class="text-[11px] text-gray-400 font-medium uppercase tracking-wider">Block</label>
            <div class="relative">
              <select name="farm" id="farmSelect" onchange="this.form.submit()" class="w-full bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-xl px-3 py-2 pr-8 focus:outline-none cursor-pointer">
                <option value="">All</option>
                <option value="1">Block 1</option><option value="2">Block 2</option><option value="3">Block 3</option>
                <option value="4">Block 4</option><option value="5">Block 5</option><option value="6">Block 6</option>
                <option value="7">Block 7</option><option value="8">Block 8</option>
              </select>
              <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
            </div>
          </div>
          <div class="flex flex-col gap-1 min-w-[130px]">
            <label class="text-[11px] text-gray-400 font-medium uppercase tracking-wider">Grade</label>
            <div class="relative">
              <select name="grade" id="gradeSelect" onchange="this.form.submit()" class="w-full bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-xl px-3 py-2 pr-8 focus:outline-none cursor-pointer">
                <option value="">All</option>
                <option value="25BCP">25BCP</option><option value="30BCP">30BCP</option><option value="33BCP">33BCP</option>
                <option value="30TR">30TR</option><option value="IF36TR">IF36TR</option><option value="IF38TR">IF38TR</option>
              </select>
              <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
            </div>
          </div>
          <div class="flex flex-col gap-1 min-w-[120px]">
            <label class="text-[11px] text-gray-400 font-medium uppercase tracking-wider">Size</label>
            <div class="relative">
              <select name="size" id="sizeSelect" onchange="this.form.submit()" class="w-full bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-xl px-3 py-2 pr-8 focus:outline-none cursor-pointer">
                <option value="">All</option>
              </select>
              <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
            </div>
          </div>
          <div class="flex flex-col gap-1 min-w-[140px]">
            <label class="text-[11px] text-gray-400 font-medium uppercase tracking-wider">Finger Count</label>
            <div class="relative">
              <select name="finger" id="fingerSelect" onchange="this.form.submit()" class="w-full bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-xl px-3 py-2 pr-8 focus:outline-none cursor-pointer">
                <option value="">All</option>
              </select>
              <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
            </div>
          </div>
          <div class="flex flex-col gap-1 min-w-[140px]">
            <label class="text-[11px] text-gray-400 font-medium uppercase tracking-wider">Quick Range</label>
            <div class="relative">
              <select name="range" id="rangeSelect" onchange="applyQuickRange(this.value)" class="w-full bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-xl px-3 py-2 pr-8 focus:outline-none cursor-pointer">
                <option value="">Custom</option>
                <option value="this_week">This Week</option><option value="last_week">Last Week</option>
                <option value="this_month">This Month</option><option value="last_month">Last Month</option>
              </select>
              <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
            </div>
          </div>
          <div class="flex flex-col gap-1 min-w-[200px]">
            <label class="text-[11px] text-gray-400 font-medium uppercase tracking-wider">Date Range</label>
            <input type="text" id="rangePicker" placeholder="Pick start &amp; end dates" readonly />
            <input type="hidden" name="start" id="startDate" />
            <input type="hidden" name="end"   id="endDate" />
          </div>
          <a href="/logs" class="text-xs text-gray-400 hover:text-red-500 flex items-center gap-1 no-underline transition-colors pb-2">
            <i class="fa-solid fa-xmark"></i> Clear
          </a>
        </form>
      </div>

      <!-- Total Harvest Summary -->
      <div id="harvest-summary" class="bg-white rounded-2xl border border-emerald-100 shadow-sm p-4 mb-6 flex flex-wrap items-center justify-between gap-4"
           style="background:linear-gradient(135deg,#ecfdf5,#ffffff);">
        <!-- Filled by logs.js -->
      </div>

      <!-- Table -->
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="min-w-full" id="logTable">
            <thead>
              <tr style="background:#f0fdf4;border-bottom:2px solid #d1fae5;">
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider whitespace-nowrap" style="color:#065f46;">No.</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider whitespace-nowrap" style="color:#065f46;">Farm</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider whitespace-nowrap" style="color:#065f46;">Grade</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider whitespace-nowrap" style="color:#065f46;">Finger Count</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider whitespace-nowrap" style="color:#065f46;">Size</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider whitespace-nowrap" style="color:#065f46;">Weight</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider whitespace-nowrap" style="color:#065f46;">Confidence</th>
                <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider whitespace-nowrap" style="color:#065f46;">Date</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-50"><!-- Filled by logs.js --></tbody>
            <tfoot>
              <tr style="background:#f0fdf4;border-top:2px solid #d1fae5;">
                <td colspan="5" class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-right" style="color:#065f46;">Total Weight</td>
                <td id="foot-weight" class="px-4 py-3 text-sm font-bold" style="color:#065f46;">—</td>
                <td colspan="2"></td>
              </tr>
            </tfoot>
          </table>
        </div>
        <div class="flex items-center justify-between px-5 py-3 border-t border-gray-100">
          <span id="pageInfo" class="text-xs text-gray-400">Page 1</span>
          <div class="flex items-center gap-2">
            <button id="prevPage" class="flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-lg border border-gray-200 text-gray-500 hover:border-emerald-300 hover:text-emerald-600 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"><i class="fa-solid fa-chevron-left text-xs"></i> Prev</button>
            <button id="nextPage" class="flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-lg border border-gray-200 text-gray-500 hover:border-emerald-300 hover:text-emerald-600 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">Next <i class="fa-solid fa-chevron-right text-xs"></i></button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="/js/header.js"></script>
  <script src="/js/logs.js"></script>
  <script>
    loadHeader();
    $(function() { $("#sidebar-placeholder").load("/components/sidebar.html"); });

    (function() {
      const p = new URLSearchParams(window.location.search);
      if (p.get('farm'))   document.getElementById('farmSelect').value   = p.get('farm');
      if (p.get('grade'))  document.getElementById('gradeSelect').value  = p.get('grade');
      if (p.get('range'))  document.getElementById('rangeSelect').value  = p.get('range');
      if (p.get('start'))  document.getElementById('startDate').value    = p.get('start');
      if (p.get('end'))    document.getElementById('endDate').value      = p.get('end');
    })();

    function exportToPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const now = new Date();
      const pageWidth = doc.internal.pageSize.getWidth();
      doc.setFontSize(10); doc.setFont("helvetica","normal");
      const tsText = now.toLocaleString();
      doc.text(tsText, pageWidth - doc.getTextWidth(tsText) - 14, 10);
      const title = "Block Operation Logs";
      doc.setFontSize(16); doc.setFont("helvetica","bold");
      doc.text(title, (pageWidth - doc.getTextWidth(title)) / 2, 16);
      const rows = [];
      document.querySelectorAll("tbody tr").forEach(tr => {
        const rowData = [];
        tr.querySelectorAll("td").forEach(td => rowData.push(td.innerText.trim()));
        if (rowData.length > 1) rows.push(rowData);
      });
      const footWeight = document.getElementById('foot-weight')?.innerText.trim() || '';
      doc.autoTable({
        head:[["#","Block","Grade","Finger Count","Size","Weight","Confidence","Date"]],
        body: rows,
        foot: footWeight ? [["","","","","Total Weight", footWeight,"",""]] : [],
        startY:24, theme:'grid',
        headStyles:{fillColor:[6,95,70],textColor:255,fontStyle:'bold',halign:'center'},
        footStyles:{fillColor:[240,253,244],textColor:[6,95,70],fontStyle:'bold',halign:'center'},
        styles:{halign:'center',fontSize:9}, showFoot:'lastPage',
      });
      doc.save(`Logs_${now.toISOString().slice(0,10)}.pdf`);
    }
  </script>
</body>
</html>
