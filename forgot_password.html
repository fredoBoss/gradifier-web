<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Gradifier</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/src/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
    * { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-slate-400 min-h-screen flex justify-center items-center">

  <div class="bg-white p-5 w-96 shadow-lg rounded-md">
    <h2 class="text-lg font-semibold text-gray-700 mb-1">Reset Password</h2>
    <hr class="mt-3 mb-4" />

    <div id="alertBox" class="hidden text-sm px-3 py-2 rounded mb-3"></div>

    <form id="resetForm" class="flex flex-col gap-3">
      <div>
        <label class="block text-base mb-2">Email</label>
        <input type="email" id="email" required class="border rounded-md w-full text-base px-2 py-1 focus:outline-none focus:border-yellow-400" />
      </div>
      <div>
        <label class="block text-base mb-2">New Password</label>
        <input type="password" id="newPassword" required class="border rounded-md w-full text-base px-2 py-1 focus:outline-none focus:border-yellow-400" />
      </div>
      <div>
        <label class="block text-base mb-2">Confirm Password</label>
        <input type="password" id="confirmPassword" required class="border rounded-md w-full text-base px-2 py-1 focus:outline-none focus:border-yellow-400" />
      </div>
      <div class="flex justify-between items-center mt-1">
        <a href="/login" class="text-blue-800 text-sm">Back to login</a>
      </div>
      <button type="submit" id="submitBtn" class="border-2 border-yellow-500 bg-yellow-500 text-white py-1 w-full rounded-md hover:bg-transparent hover:text-yellow-500 font-semibold mt-2">
        Confirm
      </button>
    </form>
  </div>

  <script>
    function showAlert(msg, isError) {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.className = `text-sm px-3 py-2 rounded mb-3 ${isError ? 'bg-red-100 text-red-700 border border-red-300' : 'bg-green-100 text-green-700 border border-green-300'}`;
      box.classList.remove('hidden');
    }

    document.getElementById('resetForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Updating…';

      const res = await fetch('/api/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:           document.getElementById('email').value,
          newPassword:     document.getElementById('newPassword').value,
          confirmPassword: document.getElementById('confirmPassword').value,
        }),
      });

      const data = await res.json();
      if (res.ok) {
        showAlert('Password updated successfully! Redirecting to login…', false);
        setTimeout(() => window.location.href = '/login', 3000);
      } else {
        showAlert(data.error || 'An error occurred', true);
        btn.disabled = false; btn.textContent = 'Confirm';
      }
    });
  </script>
</body>
</html>
